packages:
  "framer-motion": "Animations for page transitions and premium cinematic feel"
  "zustand": "Global state management for the unified shopping cart"
  "react-hook-form": "Form handling for checkout, booking, and quotes"
  "@hookform/resolvers": "Zod validation integration for forms"
  "date-fns": "Date manipulation for the booking calendar"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility to cleanly merge Tailwind classes"

images:
  - path: "apps/web/public/images/hero-bg.png"
    description: "Dark, moody cinematic photography of a professional recording studio desk with glowing red accents, deep shadows, and subtle smoke or haze. High contrast, luxury feel."
    aspect_ratio: "16:9"
  - path: "apps/web/public/images/about-portrait.png"
    description: "Cinematic dark portrait lighting, silhouette of a guitarist with a fretless guitar, deep red rim light, pure black background, elegant and mysterious."
    aspect_ratio: "3:4"
  - path: "apps/web/public/images/portal-bg.png"
    description: "Abstract dark luxury texture, dark charcoal and deep crimson red, subtle glowing ember particles, depth of field."
    aspect_ratio: "16:9"

notes:
  - "Assuming @workspace/api-client-react is available for all Orval generated hooks."
  - "Cart uses Zustand for global state."
  - "Using Framer Motion for cinematic reveals."
