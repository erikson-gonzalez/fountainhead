kind = "web"
previewPath = "/"
title = "Fountainhead — Tom Geldschläger"
version = "1.0.0"
id = "artifacts/fountainhead"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21754
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/fountainhead run dev"

[services.env]
PORT = "21754"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/fountainhead", "run", "build"]
publicDir = "artifacts/fountainhead/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
